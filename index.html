<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Инвест-трекер — Вход</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#181c27;--bg3:#1e2334;--bg4:#252b3b;
  --border:#2a3048;--border2:#3a4568;
  --text:#e8eaf0;--text2:#9ba3c0;--text3:#5c6480;
  --accent:#6366f1;
  --danger:#ef4444;--danger-bg:rgba(239,68,68,.1);
  --success:#22c55e;
}
body.light{
  --bg:#f0f2f7;--bg2:#ffffff;--bg3:#f5f7fc;--bg4:#eaecf4;
  --border:#d4d8e8;--border2:#b8bed8;
  --text:#1a1d2e;--text2:#4a5070;--text3:#8890aa;
}
body{
  font-family:'Manrope',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
}
.auth-theme-btn{
  position:fixed;top:16px;right:16px;
  background:none;border:1px solid var(--border2);border-radius:20px;
  padding:5px 12px;cursor:pointer;font-size:12px;color:var(--text2);
  font-family:'Manrope',sans-serif;transition:all .2s;
}
.auth-theme-btn:hover{background:var(--bg3);color:var(--text)}
.auth-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:16px;
  padding:40px 36px;width:100%;max-width:400px;text-align:center;
}
.auth-logo{font-size:40px;margin-bottom:12px}
.auth-title{font-size:22px;font-weight:700;margin-bottom:6px}
.auth-sub{font-size:14px;color:var(--text2);margin-bottom:32px}
.auth-btn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:13px 20px;border-radius:10px;font-size:14px;font-weight:600;
  cursor:pointer;border:1px solid var(--border2);background:var(--bg3);
  color:var(--text);font-family:'Manrope',sans-serif;transition:all .2s;margin-bottom:10px;
}
.auth-btn:hover{background:var(--bg4);border-color:var(--accent)}
.auth-btn-google{border-color:rgba(66,133,244,.4);color:#4285F4}
.auth-btn-google:hover{background:rgba(66,133,244,.1)}
.auth-btn-accent{background:var(--accent)!important;color:#fff!important;border-color:var(--accent)!important}
.auth-divider{color:var(--text3);font-size:12px;margin:16px 0;position:relative}
.auth-divider::before,.auth-divider::after{
  content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--border)
}
.auth-divider::before{left:0}.auth-divider::after{right:0}
.auth-input{
  width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;
  padding:11px 14px;color:var(--text);font-size:14px;font-family:'Manrope',sans-serif;
  outline:none;margin-bottom:10px;
}
.auth-input:focus{border-color:var(--accent)}
.auth-error{color:var(--danger);font-size:12px;margin-bottom:10px;min-height:18px}
.auth-success{color:var(--success);font-size:12px;margin-bottom:10px;min-height:18px}
.auth-toggle{font-size:12px;color:var(--text2);margin-top:16px}
.auth-toggle a{color:var(--accent);cursor:pointer}
.hidden{display:none!important}
#loading{
  position:fixed;inset:0;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;color:var(--text2);font-family:'Manrope',sans-serif;
  z-index:100;
}
</style>
</head>
<body>

<div id="loading">Загрузка...</div>

<button class="auth-theme-btn" onclick="toggleTheme()" id="theme-btn">🌙 Тёмная</button>

<div class="auth-card" id="auth-card" style="display:none">
  <div class="auth-logo">💼</div>
  <div class="auth-title">Инвест-трекер</div>
  <div class="auth-sub">Учёт инвестиций через GoCrowd, InvestRoom и iKapitalist</div>

  <button class="auth-btn auth-btn-google" onclick="signInGoogle()">
    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.17z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2.04a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/><path fill="#FBBC05" d="M4.5 10.48A4.8 4.8 0 0 1 4.5 7.5V5.43H1.83a8 8 0 0 0 0 7.12z"/><path fill="#EA4335" d="M8.98 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.59C13.46.99 11.64.2 8.98.2a8 8 0 0 0-7.15 4.42L4.5 6.7c.57-1.69 2.15-3.12 4.48-3.12z"/></svg>
    Войти через Google
  </button>

  <div class="auth-divider">или</div>

  <div id="mode-login">
    <input class="auth-input" id="email" type="email" placeholder="Email" autocomplete="email">
    <input class="auth-input" id="password" type="password" placeholder="Пароль" autocomplete="current-password">
    <div class="auth-error" id="err-login"></div>
    <button class="auth-btn auth-btn-accent" onclick="signInEmail()">Войти</button>
    <div class="auth-toggle">Нет аккаунта? <a onclick="switchMode('register')">Зарегистрироваться</a></div>
  </div>

  <div id="mode-register" class="hidden">
    <input class="auth-input" id="email-reg" type="email" placeholder="Email" autocomplete="email">
    <input class="auth-input" id="password-reg" type="password" placeholder="Пароль (минимум 6 символов)" autocomplete="new-password">
    <div class="auth-error" id="err-reg"></div>
    <button class="auth-btn auth-btn-accent" onclick="signUpEmail()">Создать аккаунт</button>
    <div class="auth-toggle">Уже есть аккаунт? <a onclick="switchMode('login')">Войти</a></div>
  </div>
</div>

<script>
const SUPABASE_URL  = 'https://afnxgnoqkxtyrcwhgbyv.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmbnhnbm9xa3h0eXJjd2hnYnl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3Mjc2MDMsImV4cCI6MjA5MDMwMzYwM30.u-2LyXTvnP0ltI8ae78SozKv58SE_z63exMarIno1Ks';
const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// Тема
function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  localStorage.setItem('inv_theme', isLight ? 'light' : 'dark');
  document.getElementById('theme-btn').textContent = isLight ? '🌙 Тёмная' : '☀️ Светлая';
}
(function initTheme() {
  const saved = localStorage.getItem('inv_theme');
  const isLight = saved === 'light';
  if (isLight) document.body.classList.add('light');
  const btn = document.getElementById('theme-btn');
  if (btn) btn.textContent = isLight ? '🌙 Тёмная' : '☀️ Светлая';
})();

// Если уже залогинен — сразу перекидываем на app.html
_sb.auth.getSession().then(({ data: { session } }) => {
  if (session && session.user) {
    window.location.replace('./app.html');
  } else {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('auth-card').style.display = 'block';
  }
});

function switchMode(mode) {
  document.getElementById('mode-login').classList.toggle('hidden', mode !== 'login');
  document.getElementById('mode-register').classList.toggle('hidden', mode !== 'register');
  document.getElementById('err-login').textContent = '';
  document.getElementById('err-reg').textContent = '';
}

async function signInGoogle() {
  const { error } = await _sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/app.html' }
  });
  if (error) document.getElementById('err-login').textContent = error.message;
}

async function signInEmail() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl    = document.getElementById('err-login');
  errEl.textContent = '';
  if (!email || !password) { errEl.textContent = 'Заполни email и пароль'; return; }
  const { error } = await _sb.auth.signInWithPassword({ email, password });
  if (error) {
    errEl.textContent = error.message;
  } else {
    window.location.replace('./app.html');
  }
}

async function signUpEmail() {
  const email    = document.getElementById('email-reg').value.trim();
  const password = document.getElementById('password-reg').value;
  const errEl    = document.getElementById('err-reg');
  errEl.textContent = '';
  if (!email || !password) { errEl.textContent = 'Заполни email и пароль'; return; }
  const { error } = await _sb.auth.signUp({ email, password });
  if (error) {
    errEl.textContent = error.message;
  } else {
    errEl.className = 'auth-success';
    errEl.textContent = '✓ Проверь почту — письмо для подтверждения отправлено';
  }
}
</script>
</body>
</html>
